<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="edge-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f9dde"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="url(#edge-grad)"/>
  <circle cx="256" cy="256" r="200" fill="#fff" opacity="0.08"/>
  
  <!-- Stylized E with echo waves -->
  <g transform="translate(256,256)">
    <!-- Main E letterform -->
    <path d="M-90,-120 L60,-120 L60,-85 L-50,-85 L-50,-20 L45,-20 L45,15 L-50,15 L-50,50 L65,50 L65,85 L-90,85 Z" 
          fill="#fff" transform="translate(-30,0)"/>
    
    <!-- Echo wave 1 -->
    <path d="M130,-60 Q170,-40 170,-10 Q170,20 130,40" 
          stroke="#fff" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9"/>
    
    <!-- Echo wave 2 -->
    <path d="M160,-80 Q210,-55 210,-15 Q210,25 160,60" 
          stroke="#fff" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.6"/>
    
    <!-- Echo wave 3 -->
    <path d="M190,-95 Q250,-65 250,-15 Q250,35 190,75" 
          stroke="#fff" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.35"/>
  </g>
</svg>
